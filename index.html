<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanzi Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Thêm thư viện hiệu ứng cuộn AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --dark-color: #2d3436;
            --light-color: #dfe6e9;
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #f9f9f9;
            color: var(--dark-color);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }

        .content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .content h1 span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content p {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 35px;
            line-height: 1.7;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .btn-group {
                justify-content: center;
            }
        }

        /* 1. SỬA BUTTON ANIMATION MƯỢT MÀ HƠN */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            /* Thay đổi transition dùng cubic-bezier giúp nút nảy (bounce) nhẹ nhàng cực mượt */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-4px); /* Nhấc nhẹ nút lên */
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.4);
        }

        .btn-secondary {
            background: #fff;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background: var(--primary-color);
            color: #fff;
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.15);
        }

        .image-wrapper {
            display: flex;
            justify-content: center;
        }

        /* 2. SỬA ẢNH THÀNH CHUYỂN ĐỘNG LƠ LỬNG & BIẾN ĐỔI (BLOB) */
        .profile-img {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            
            /* Thêm animation: float (lơ lửng) và morph (co giãn góc bo) chạy song song */
            animation: float 4s ease-in-out infinite, morph 8s ease-in-out infinite;
        }

        /* Hiệu ứng lơ lửng lên xuống */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* Hiệu ứng chuyển động hình dáng mềm mại xung quanh viền ảnh */
        @keyframes morph {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
            50% { border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="container">
            
            <!-- 3. THÊM HIỆU ỨNG CUỘN (AOS) CHO NỘI DUNG CHỮ -->
            <div class="content" data-aos="fade-right" data-aos-duration="1000">
                <h1>Xin chào, Tôi là <br><span>Yanzi</span></h1>
                <p>Tôi là một nhà phát triển phần mềm đam mê tạo ra các trải nghiệm giao diện người dùng mượt mà và tối ưu.</p>
                <div class="btn-group">
                    <a href="#" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Liên Hệ</a>
                    <a href="#" class="btn btn-secondary"><i class="fa-solid fa-briefcase"></i> Dự Án</a>
                </div>
            </div>

            <!-- 3. THÊM HIỆU ỨNG CUỘN (AOS) CHO KHỐI ẢNH -->
            <div class="image-wrapper" data-aos="fade-left" data-aos-duration="1000">
                <img src="assets/profile.jpg" alt="Yanzi Profile" class="profile-img">
            </div>

        </div>
    </section>

    <!-- Thư viện JS của AOS để kích hoạt hiệu ứng cuộn -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Khởi tạo AOS
        AOS.init({
            once: false // Đặt thành false để khi cuộn lên cuộn xuống hiệu ứng đều hoạt động mượt mà
        });
    </script>
</body>
</html>
